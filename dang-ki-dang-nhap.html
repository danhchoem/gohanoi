<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập/Đăng Ký - Go Hanoi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="/minilogo vuông nền trogn suốt.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fecbb3, #ebc687);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(220,38,38,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(220,38,38,0.2);
        }
        h2 {
            color: #DC2626;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.75rem;
        }
        p { color: #666; margin-bottom: 2rem; }
        .tab.active { background: linear-gradient(135deg, #DC2626, #F59E0B); color: white; }
        button {
            background: linear-gradient(135deg, #DC2626, #F59E0B);
        }
        input:focus {
            border-color: #DC2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 138, 0.1);
        }
        button:hover { box-shadow: 0 10px 20px rgba(220, 38, 38, 0.1); }
        .links a {
            color: #DC2626;
        }
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        p { color: #666; margin-bottom: 2rem; }
        .tabs {
            display: flex;
            background: #fde2c3;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .tab.active { background: linear-gradient(135deg, #f39236 0%, #f54500 100%); color: rgb(255, 255, 255); }
        .form { display: none; }
        .form.active { display: block; }
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 1rem;
            border: none;
            background: linear-gradient(135deg,  #f39236 0%, #f54500 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgb(240, 181, 130); }
        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
            color: #c93e3e;
        }
        .divider::before {
     
        }
        .divider span {
            background: white;
            padding: 0 1rem;
        }
        .links a {
            color: #ff7b00;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .links a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .container { margin: 1rem; padding: 2rem 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <img src="/tháp ok-Photoroom.png" alt="Go Hà Nội" class="logo">
        <h2><b>Go Hanoi</b></h2>
        <p>Khám phá Thủ đô nghìn năm văn hiến</p>
       
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">
               <b> <i class="fas fa-sign-in-alt"></i> Đăng nhập</b>
            </button>
            <button class="tab" onclick="switchTab('register')">
             <b> <i class="fas fa-user-plus"></i> Đăng ký</b>  
            </button>
        </div>


        <form class="form active" id="login">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit">Đăng nhập</button>
        </form>


        <form class="form" id="register">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-fullname" placeholder="Họ tên" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" placeholder="Mật khẩu" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-confirm" placeholder="Xác nhận mật khẩu" required>
            </div>
            <button type="submit">Đăng ký</button>
        </form>


        <div class="divider">
            <span>Hoặc</span>
        </div>


        <div class="links">
            <a href="mailto:gohanoi@gmail.vn?subject=Quên mật khẩu &body=Xin chào Go Hanoi, tôi đã quên mật khẩu tài khoản Go Hanoi của mình ,rất mong bộ phận hỗ trợ cấp lại mật khẩu mới hoặc hướng dẫn tôi các bước khôi phục. Xin cảm ơn!"><i class="fas fa-question-circle"></i> Quên mật khẩu?</a>
           
            <a href="/trachu.html"><i class="fas fa-home"></i> Trang chủ</a>
        </div>
    </div>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(type).classList.add('active');
            event.target.classList.add('active');
        }


        // Load auth module
        document.querySelectorAll('form').forEach(form => {
            form.onsubmit = async function(e) {
                e.preventDefault();
                const isLogin = form.id === 'login';
                try {
                    if (isLogin) {
                        const email = document.getElementById('login-email').value;
                        const password = document.getElementById('login-password').value;
                        await loginUser(email, password);
                        alert('Đăng nhập thành công! 🎉');
                        window.location.href = 'trachu.html';
                    } else {
                        const fullname = document.getElementById('reg-fullname').value;
                        const email = document.getElementById('reg-email').value;
                        const password = document.getElementById('reg-password').value;
                        const confirm = document.getElementById('reg-confirm').value;
                        if (password !== confirm) throw new Error('Mật khẩu xác nhận không khớp!');
                        await registerUser(fullname, email, password);
                        alert('Đăng ký thành công! Kiểm tra email để xác thực 🎉');
                        window.location.href = 'trachu.html';
                    }
                } catch (error) {
                    alert('Lỗi: ' + error.message);
                }
            };
        });
    </script>
    <!-- Firebase SDK v9 compat (matches config) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="auth.js"></script>


</body>
</html>
